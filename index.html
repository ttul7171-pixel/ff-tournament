<!DOCTYPE html>
<html>
<head>
<title>FF Squad Tournament Registration</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:url("https://wallpaperaccess.com/full/1489353.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(0,0,0,0.75);
padding:35px;
border-radius:12px;
width:420px;
color:white;
text-align:center;
backdrop-filter:blur(5px);
}

h1{
margin-bottom:5px;
font-size:26px;
letter-spacing:1px;
}

.sub{
font-size:13px;
color:#d1d5db;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:7px 0;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

input::placeholder{
color:#9ca3af;
}

button{
width:100%;
padding:13px;
margin-top:12px;
background:#f97316;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
color:white;
cursor:pointer;
}

button:hover{
background:#ea580c;
}

.checkbox{
margin-top:12px;
font-size:13px;
text-align:left;
color:#d1d5db;
}

.checkbox input{
width:auto;
margin-right:6px;
}

.footer{
margin-top:15px;
font-size:12px;
color:#9ca3af;
}

</style>

</head>

<body>

<div class="container">

<h1>Free Fire Squad Tournament</h1>
<div class="sub">Official Team Registration Form</div>

<form action="https://script.google.com/macros/s/AKfycbzWH1ZIsYsVVBipLzI0yF3riN1jDatq5f-Sz1Bh1X15e0ZeUWDn2FejM60NhinNR2fOlA/exec" method="post">

<input type="text" name="teamname" placeholder="Team Name" required>

<input type="text" name="p1" placeholder="Player 1 ID" required>
<input type="text" name="p2" placeholder="Player 2 ID" required>
<input type="text" name="p3" placeholder="Player 3 ID" required>
<input type="text" name="p4" placeholder="Player 4 ID" required>

<input type="tel" name="whatsapp" placeholder="WhatsApp Number" required>

<select name="server" required>
<option value="">Select Server</option>
<option>India</option>
<option>Bangladesh</option>
<option>Singapore</option>
</select>

<div class="checkbox">
<label>
<input type="checkbox" required>
Our team is registering voluntarily and agrees to follow all tournament rules.
</label>
</div>

<button type="submit">Submit Registration</button>

</form>

<div class="footer">
FF Community Esports Tournament
</div>

</div>

</body>
</html>
